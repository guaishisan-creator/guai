<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="color-scheme" content="dark" />
    <title>HB正常维护中</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Microsoft YaHei", sans-serif;
        background: #05070a;
        color: #f5f7fa;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(67, 214, 184, 0.12), transparent 34rem),
          linear-gradient(145deg, #090d12 0%, #030406 72%);
      }

      body::before {
        position: fixed;
        inset: 0;
        content: "";
        pointer-events: none;
        opacity: 0.28;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black, transparent 72%);
      }

      main {
        position: relative;
        z-index: 1;
        width: min(90vw, 760px);
        padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 6vw, 5rem);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 28px;
        background: rgba(9, 13, 18, 0.72);
        box-shadow: 0 28px 100px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .mark {
        display: grid;
        width: 68px;
        height: 68px;
        margin: 0 auto 2rem;
        place-items: center;
        border: 1px solid rgba(87, 236, 203, 0.38);
        border-radius: 20px;
        color: #68e8cb;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-indent: 0.16em;
        box-shadow: inset 0 0 30px rgba(67, 214, 184, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 4.5rem);
        font-weight: 680;
        letter-spacing: -0.045em;
        line-height: 1.08;
      }

      p {
        margin: 1.25rem 0 0;
        color: #aab4c0;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        letter-spacing: 0.08em;
      }

      .signal {
        display: flex;
        width: 70px;
        margin: 2.5rem auto 0;
        justify-content: space-between;
      }

      .signal span {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #5ce3c4;
        animation: pulse 1.6s ease-in-out infinite;
      }

      .signal span:nth-child(2) {
        animation-delay: 0.2s;
      }

      .signal span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.25;
          transform: translateY(0);
        }
        50% {
          opacity: 1;
          transform: translateY(-5px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .signal span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="maintenance-title">
      <div class="mark" aria-hidden="true">HB</div>
      <h1 id="maintenance-title">HB正常维护中</h1>
      <p>新的项目即将呈现</p>
      <div class="signal" aria-hidden="true"><span></span><span></span><span></span></div>
    </main>
  </body>
</html>
